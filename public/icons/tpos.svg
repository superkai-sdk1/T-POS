<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#0A051E"/>
  <defs>
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="titanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7D54ED"/>
      <stop offset="100%" stop-color="#4F359B"/>
    </linearGradient>
    <linearGradient id="edgeLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7D54ED" stop-opacity="0.2"/>
    </linearGradient>
    <pattern id="posGrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" rx="4" fill="white" fill-opacity="0.1" />
    </pattern>
  </defs>
  <!-- Основной каркас (Призма) -->
  <path d="M256 30 L460 145 V367 L256 482 L52 367 V145 Z" fill="#221562" stroke="url(#edgeLight)" stroke-width="2"/>
  <!-- Задняя подсветка -->
  <circle cx="256" cy="256" r="120" fill="#7D54ED" fill-opacity="0.2"/>
  <!-- Верхняя "Стеклянная" грань -->
  <path d="M256 30 L460 145 L256 260 L52 145 Z" fill="url(#glassFill)" stroke="white" stroke-opacity="0.2"/>
  <!-- Правая грань с сеткой POS -->
  <path d="M460 145 L256 260 V482 L460 367 Z" fill="url(#posGrid)"/>
  <path d="M460 145 L256 260 V482 L460 367 Z" fill="white" fill-opacity="0.02" stroke="white" stroke-opacity="0.05"/>
  <!-- Левая грань (чековая лента) -->
  <path d="M52 145 L256 260 V482 L52 367 Z" fill="#7D54ED" fill-opacity="0.05" stroke="white" stroke-opacity="0.1"/>
  <path d="M100 200 V350 L130 340 L160 350 L190 340 L220 350 V240" stroke="#7D54ED" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.6"/>
  <!-- Центральное ядро -->
  <circle cx="256" cy="256" r="40" fill="url(#titanGrad)"/>
  <circle cx="256" cy="256" r="40" fill="white" fill-opacity="0.2"/>
</svg>
